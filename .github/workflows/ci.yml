name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege token: both jobs only read the repo contents.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    env:
      MPLBACKEND: Agg
    # SHA-pinned actions (tag in the trailing comment); Dependabot keeps them fresh.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: System libs for OpenCV
        run: sudo apt-get update && sudo apt-get install -y libgl1
      - name: Install CPU torch first (keeps the multi-GB CUDA wheel out of CI)
        run: pip install torch==2.9.0 torchvision==0.24.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff
      - name: Lint
        run: ruff check .
      - name: Tier-1 tests (no weights, no GPU)
        run: pytest -m "not local"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        # CI=true (Actions default) makes CRA treat warnings as errors; the
        # legacy codebase has warnings, and fixing them is out of phase-0-PR① scope.
        run: CI=false npm run build
