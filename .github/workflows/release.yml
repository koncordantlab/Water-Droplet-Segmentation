name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: read the repo, write the GHCR package. No custom secrets.
permissions:
  contents: read
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          # lowercase is mandatory for GHCR; repo display name is mixed-case
          images: ghcr.io/koncordantlab/water-droplet-segmentation
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # gha cache may evict the multi-GB torch layer; acceptable — a cold
          # build is ~10 min and correctness never depends on the cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
