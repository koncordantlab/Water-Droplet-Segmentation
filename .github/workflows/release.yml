name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: read the repo, write the GHCR package. No custom secrets.
permissions:
  contents: read
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    # A wedged registry push shouldn't hold the release queue for the 6 h default.
    timeout-minutes: 60
    # Actions are SHA-pinned (tag in the trailing comment): this workflow holds
    # packages:write on a public repo, and a hijacked action tag could publish a
    # poisoned image the deploy box would pull. Dependabot keeps the pins fresh.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          # lowercase is mandatory for GHCR; repo display name is mixed-case
          images: ghcr.io/koncordantlab/water-droplet-segmentation
          tags: |
            # latest only from main: a manual dispatch on another ref must not
            # repoint the tag the deploy box pulls
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # gha cache may evict the multi-GB torch layer; acceptable — a cold
          # build is ~10 min and correctness never depends on the cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
